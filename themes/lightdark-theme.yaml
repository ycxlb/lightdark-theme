Ocean Dark:
  # ========== 基础颜色 ==========
  primary-color: "#4FC3F7"
  dark-primary-color: "#0288D1"
  light-primary-color: "#B3E5FC"
  accent-color: "#FF7043"
  
  # ========== 文字颜色 ==========
  primary-text-color: "#ECEFF1"
  secondary-text-color: "#B0BEC5"
  text-primary-color: "#FFFFFF"
  disabled-text-color: "#78909C"
  
  # ========== 背景颜色 ==========
  primary-background-color: "#0D1B2A"
  secondary-background-color: "#1B263B"
  card-background-color: "#1B2838"
  
  # ========== 卡片样式 ==========
  ha-card-border-radius: "16px"
  ha-card-box-shadow: "0 4px 20px rgba(0,0,0,0.4)"
  
  # ========== 侧边栏 ==========
  sidebar-background-color: "#0D1B2A"
  sidebar-text-color: "#ECEFF1"
  sidebar-icon-color: "#78909C"
  sidebar-selected-text-color: "#4FC3F7"
  sidebar-selected-icon-color: "#4FC3F7"
  
  # ========== 状态颜色 ==========
  state-icon-color: "#4FC3F7"
  state-icon-active-color: "#FFD54F"
  state-icon-unavailable-color: "#78909C"
  
  # ========== 错误/警告 ==========
  error-color: "#EF5350"
  warning-color: "#FFA726"
  success-color: "#66BB6A"
  info-color: "#42A5F5"
  
  # ========== 其他 ==========
  divider-color: "rgba(255,255,255,0.08)"
  scrollbar-thumb-color: "#37474F"
  
  # ========== 暗色模式覆盖（可选，如果你的主题本身就是暗色）==========
  modes:
    light:
      primary-color: "#0288D1"
      primary-text-color: "#263238"
      secondary-text-color: "#546E7A"
      primary-background-color: "#ECEFF1"
      secondary-background-color: "#CFD8DC"
      card-background-color: "#FFFFFF"
      sidebar-background-color: "#FFFFFF"
      sidebar-text-color: "#263238"
      sidebar-icon-color: "#78909C"
      state-icon-color: "#0288D1"
      divider-color: "rgba(0,0,0,0.08)"
      ha-card-box-shadow: "0 2px 12px rgba(0,0,0,0.1)"